services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: central-prometheus
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 512m
    mem_reservation: 384m
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    environment:
      PROM_SCRAPE_INTERVAL: ${PROM_SCRAPE_INTERVAL:-15s}
      PROM_EVALUATION_INTERVAL: ${PROM_EVALUATION_INTERVAL:-15s}
      AUTH_METRICS_TARGET: ${AUTH_METRICS_TARGET:-127.0.0.1:8001}
      PAYMENT_METRICS_TARGET: ${PAYMENT_METRICS_TARGET:-127.0.0.1:8002}
      SAWIT_METRICS_TARGET: ${SAWIT_METRICS_TARGET:-127.0.0.1:8082}
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/prometheus/prometheus.yml <<CONFIG
        global:
          scrape_interval: ${PROM_SCRAPE_INTERVAL:-15s}
          evaluation_interval: ${PROM_EVALUATION_INTERVAL:-15s}

        scrape_configs:
          - job_name: "auth-app"
            metrics_path: "/actuator/prometheus"
            static_configs:
              - targets: ["${AUTH_METRICS_TARGET:-127.0.0.1:8001}"]

          - job_name: "payment-app"
            metrics_path: "/actuator/prometheus"
            static_configs:
              - targets: ["${PAYMENT_METRICS_TARGET:-127.0.0.1:8002}"]

          - job_name: "sawit-app"
            metrics_path: "/actuator/prometheus"
            static_configs:
              - targets: ["${SAWIT_METRICS_TARGET:-127.0.0.1:8082}"]
        CONFIG
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml

  loki:
    image: grafana/loki:3.1.1
    container_name: central-loki
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 512m
    mem_reservation: 384m
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml

  promtail:
    image: grafana/promtail:3.1.1
    container_name: central-promtail
    profiles: ["local-logs"]
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 512m
    mem_reservation: 384m
    depends_on:
      - loki
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-http://loki:3100/loki/api/v1/push}
      PROMTAIL_CONTAINER_REGEX: ${PROMTAIL_CONTAINER_REGEX:-auth-app|payment-app|sawit-app}
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true

  grafana:
    image: grafana/grafana:11.2.2
    container_name: central-grafana
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 512m
    mem_reservation: 384m
    depends_on:
      - prometheus
      - loki
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  grafana-data:
  loki-data:
